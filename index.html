<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Finto | Premium Platformer</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app-wrapper">
        <div id="game-container">
            <div id="ui-layer">
                <div class="stat-box">
                    <span class="label">SCORE</span>
                    <span id="score">00000</span>
                </div>
                <div class="stat-box center-box">
                    <div id="concept-labels">
                        <span id="label-fi">-</span>
                        <span id="label-sv">-</span>
                        <span id="label-en">-</span>
                    </div>
                </div>
                <div class="stat-box">
                    <span class="label">CONCEPT</span>
                    <span id="world">yso:-</span>
                </div>
            </div>
            <canvas id="game-canvas"></canvas>
            <div id="overlay" class="hidden">
                <div class="overlay-content">
                    <h1 id="overlay-title">GAME OVER</h1>
                    <p>Press <span class="key">SPACE</span> to Restart</p>
                </div>
            </div>
        </div>
        <div id="tree-container">
            <canvas id="tree-canvas"></canvas>
            <div id="tree-label">LIFE TREE</div>
        </div>
    </div>
    <script type="module" src="/src/audio/utils.js"></script>
    <script type="module" src="/src/audio/theory.js"></script>
    <script type="module" src="/src/audio/generators.js"></script>
    <script type="module" src="/src/audio/audio.js"></script>
    <script type="module" src="/src/audio/MusicEngine.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
