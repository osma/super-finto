<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Finto | Premium Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-wrapper">
        <div id="game-container">
            <div id="ui-layer">
                <div class="stat-box">
                    <div style="display: flex; gap: 10px; align-items: baseline; justify-content: center;">
                        <span class="label" id="hud-score-label" style="margin-bottom: 0;">SCORE</span>
                        <span id="score">00000</span>
                    </div>
                    <div
                        style="display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 2px;">
                        <span id="coin-symbol" style="color: #ffeb3b; font-size: 0.8rem;">●</span>
                        <span id="coins-counter" class="label" style="margin-bottom: 0;">x 0</span>
                    </div>
                    <span id="lives-counter" class="label" style="margin-top: 5px; color: white;">FINTO x 3</span>
                </div>
                <div class="stat-box center-box">
                    <div id="concept-labels">
                        <span id="label-primary">-</span>
                        <span id="label-2">-</span>
                        <span id="label-3">-</span>
                        <span id="label-4">-</span>
                    </div>
                </div>
                <div class="stat-box">
                    <span class="label" id="hud-concept-label">CONCEPT</span>
                    <span id="world">yso:-</span>
                </div>
            </div>
            <canvas id="game-canvas"></canvas>
            <div id="overlay" class="hidden">
                <div class="overlay-content">
                    <h1 id="overlay-title">GAME OVER</h1>
                    <p id="overlay-restart">Press <span class="key">SPACE</span> to Restart</p>
                </div>
            </div>
            <div id="transition-overlay" class="hidden">
                <div class="transition-content">
                    <p id="transition-title">yso:p1234</p>
                    <p id="transition-subtitle">concept label</p>
                    <p id="transition-lives">FINTO x 3</p>
                </div>
            </div>
        </div>
        <div id="side-panel">
            <div id="controls-legend"></div>
            <div id="tree-container">
                <canvas id="tree-canvas"></canvas>
                <div id="tree-label">LEAVES: 0</div>
            </div>
        </div>
    </div>
    <div id="startup-overlay">
        <canvas id="startup-canvas"></canvas>
    </div>
    <script type="module" src="src/audio/utils.js"></script>
    <script type="module" src="src/audio/theory.js"></script>
    <script type="module" src="src/audio/generators.js"></script>
    <script type="module" src="src/audio/audio.js"></script>
    <script type="module" src="src/audio/MusicEngine.js"></script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
